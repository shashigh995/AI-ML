<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | X-Finance AI</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="static/js/config.js"></script>
    <style>
        .login-container { height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at top left, #1e40af 0%, #0f172a 100%); }
        .login-box { width: 100%; max-width: 400px; padding: 2.5rem; animation: fadeIn 0.8s ease-out; }
        .error-msg { color: var(--danger); font-size: 0.85rem; margin-top: 1rem; text-align: center; display: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box glass animate-fade">
            <div class="login-header" style="text-align: center; margin-bottom: 2rem;">
                <h1 style="color: var(--primary); margin-bottom: 0.5rem;"><i class="fas fa-shield-alt"></i> X-Finance</h1>
                <p style="color: var(--text-secondary);">Fraud & Risk Detection Admin Panel</p>
            </div>
            <form id="loginForm">
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary); font-size: 0.9rem;">Username</label>
                    <input type="text" id="username" class="form-input" style="width: 100%; padding: 0.75rem 1rem; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); border-radius: 8px; color: white;" placeholder="admin" required>
                </div>
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary); font-size: 0.9rem;">Password</label>
                    <input type="password" id="password" class="form-input" style="width: 100%; padding: 0.75rem 1rem; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); border-radius: 8px; color: white;" placeholder="password123" required>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; padding: 0.8rem; border-radius: 8px; font-weight: 700; cursor: pointer; border: none; color: white; background: linear-gradient(to right, var(--primary), var(--accent-cyan));">Secure Login</button>
                <p id="errorMessage" class="error-msg">Invalid Credentials</p>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const error = document.getElementById('errorMessage');

            // Use the global API setting
            const res = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (data.success) {
                localStorage.setItem('user', data.user);
                window.location.href = 'dashboard.html';
            } else {
                error.textContent = data.message;
                error.style.display = 'block';
            }
        });
    </script>
</body>
</html>
