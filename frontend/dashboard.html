<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | X-Finance AI</title>
    <link rel="stylesheet" href="static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="static/js/config.js"></script>
    <style>
        .chart-container { padding: 1.5rem; margin-bottom: 2rem; min-height: 350px; }
        .alert-item { padding: 1rem; border-radius: 12px; background: rgba(239, 68, 68, 0.05); border: 1px solid rgba(239, 68, 68, 0.2); margin-bottom: 1rem; display: flex; align-items: center; gap: 1rem; }
        .sidebar { position: fixed; left: 0; top: 0; width: 250px; height: 100vh; padding: 2rem 1.5rem; display: flex; flex-direction: column; z-index: 100; }
        .main-content { margin-left: 250px; padding: 2rem; min-height: 100vh; }
    </style>
</head>
<body>
    <div class="sidebar glass">
        <div class="logo"><i class="fas fa-shield-alt"></i> X-Finance</div>
        <ul class="nav-links">
            <li class="nav-item"><a href="dashboard.html" class="nav-link active"><i class="fas fa-home"></i> Dashboard</a></li>
            <li class="nav-item"><a href="transactions.html" class="nav-link"><i class="fas fa-exchange-alt"></i> Transactions</a></li>
            <li class="nav-item"><a href="upload.html" class="nav-link"><i class="fas fa-upload"></i> Upload Data</a></li>
        </ul>
        <div style="margin-top: auto;"><a href="login.html" class="nav-link" style="color: var(--danger);" onclick="localStorage.clear()"><i class="fas fa-sign-out-alt"></i> Logout</a></div>
    </div>

    <main class="main-content">
        <header class="header-flex">
            <div>
                <h1 class="animate-fade">Financial Risk Dashboard</h1>
                <p style="color: var(--text-secondary);">Real-time monitoring and fraud analytics</p>
            </div>
            <div class="btn btn-primary" onclick="location.reload()"><i class="fas fa-sync"></i> Refresh Page</div>
        </header>

        <section class="dashboard-grid">
            <div class="stat-card glass hover-glow animate-fade">
                <div class="stat-header"><span style="color: var(--text-secondary);">Total Transactions</span><div class="stat-icon"><i class="fas fa-database"></i></div></div>
                <div class="stat-value" id="totalTrans">0</div>
            </div>
            <div class="stat-card glass hover-glow animate-fade" style="animation-delay: 0.1s;">
                <div class="stat-header"><span style="color: var(--text-secondary);">Fraud Detected</span><div class="stat-icon" style="color: var(--danger); background: rgba(239, 68, 68, 0.1);"><i class="fas fa-user-shield"></i></div></div>
                <div class="stat-value" id="fraudCount" style="color: var(--danger);">0</div>
            </div>
            <div class="stat-card glass hover-glow animate-fade" style="animation-delay: 0.2s;">
                <div class="stat-header"><span style="color: var(--text-secondary);">Safe Transactions</span><div class="stat-icon" style="color: var(--success); background: rgba(16, 185, 129, 0.1);"><i class="fas fa-check-circle"></i></div></div>
                <div class="stat-value" id="safeCount" style="color: var(--success);">0</div>
            </div>
        </section>

        <div class="chart-grid">
            <div class="chart-container glass animate-fade" style="animation-delay: 0.3s;">
                <h3 style="margin-bottom: 1.5rem;">Fraud Trends (Monthly)</h3>
                <canvas id="lineChart"></canvas>
            </div>
            <div class="chart-container glass animate-fade" style="animation-delay: 0.4s;">
                <h3 style="margin-bottom: 1.5rem;">Risk Segment Distribution</h3>
                <canvas id="pieChart"></canvas>
            </div>
        </div>
    </main>

    <script>
        async function loadStats() {
            const res = await fetch(`${API_URL}/stats`);
            const data = await res.json();
            document.getElementById('totalTrans').textContent = data.total;
            document.getElementById('fraudCount').textContent = data.fraud_count;
            document.getElementById('safeCount').textContent = data.safe_count;
            initCharts(data);
        }
        function initCharts(data) {
            new Chart(document.getElementById('lineChart'), {
                type: 'line',
                data: {
                    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul'],
                    datasets: [{ label: 'Fraud Cases', data: data.recent_trends, borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', fill: true, tension: 0.4 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#94a3b8' } } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } }, x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } } } }
            });
            new Chart(document.getElementById('pieChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Safe', 'Med', 'High'],
                    datasets: [{ data: data.risk_distribution, backgroundColor: ['#10b981', '#f59e0b', '#ef4444'], borderWidth: 0 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', padding: 20 } } } }
            });
        }
        window.onload = () => { if(!localStorage.getItem('user')) window.location.href='login.html'; loadStats(); }
    </script>
</body>
</html>
