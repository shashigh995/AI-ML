<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Dataset | X-Finance AI</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="static/js/config.js"></script>
    <style>
        .upload-area { border: 2px dashed var(--glass-border); padding: 3rem; text-align: center; border-radius: 20px; margin-top: 2rem; }
        .upload-area:hover { border-color: var(--primary); background: rgba(59, 130, 246, 0.05); cursor: pointer; }
    </style>
</head>
<body>
    <div class="sidebar glass">
        <div class="logo"><i class="fas fa-shield-alt"></i> X-Finance</div>
        <ul class="nav-links">
            <li class="nav-item"><a href="dashboard.html" class="nav-link"><i class="fas fa-home"></i> Dashboard</a></li>
            <li class="nav-item"><a href="transactions.html" class="nav-link"><i class="fas fa-exchange-alt"></i> Transactions</a></li>
            <li class="nav-item"><a href="upload.html" class="nav-link active"><i class="fas fa-upload"></i> Upload Data</a></li>
        </ul>
        <div style="margin-top: auto;"><a href="login.html" class="nav-link" style="color: var(--danger);"><i class="fas fa-sign-out-alt"></i> Logout</a></div>
    </div>

    <main class="main-content">
        <header class="header-flex" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <div><h1 class="animate-fade">Admin Control Panel</h1><p style="color: var(--text-secondary);">Manage datasets and model training</p></div>
        </header>

        <section class="glass animate-fade" style="padding: 2.5rem;">
            <h2>Upload Transaction Logs</h2>
            <div class="upload-area" onclick="document.getElementById('csvInput').click()">
                <i class="fas fa-cloud-upload-alt fa-3x" style="color: var(--primary); margin-bottom: 1rem;"></i>
                <h3>Drag & Drop CSV here</h3><p>or click to browse files</p>
                <input type="file" id="csvInput" style="display: none;" accept=".csv">
            </div>

            <div id="uploadStatus" style="margin-top: 2rem; display: none;" class="glass">
                <div style="padding: 1.5rem; display: flex; align-items: center; justify-content: space-between;">
                    <div style="display: flex; align-items: center; gap: 1rem;"><i class="fas fa-file-csv fa-2x" style="color: var(--success);"></i><div><strong id="fileName">Sample.csv</strong></div></div>
                    <button class="btn btn-primary" id="startUploadBtn">Start Upload</button>
                </div>
            </div>
        </section>
    <div id="uploadOverlay" class="training-overlay">
        <div class="loader-container">
            <div class="training-status" id="uploadStatusText">Uploading Data...</div>
            <p style="color: var(--text-secondary);">Syncing with Supabase Production Server</p>
            <div class="progress-bar-bg">
                <div id="uploadProgressFill" class="progress-bar-fill"></div>
            </div>
            <div style="font-size: 0.9rem; color: var(--accent-cyan);" id="uploadStep">Processing CSV...</div>
        </div>
    </div>
    </main>

    <script>
        const input = document.getElementById('csvInput');
        const statusBox = document.getElementById('uploadStatus');
        input.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) { document.getElementById('fileName').textContent = file.name; statusBox.style.display = 'block'; }
        });
        document.getElementById('startUploadBtn').addEventListener('click', async () => {
            const overlay = document.getElementById('uploadOverlay');
            const fill = document.getElementById('uploadProgressFill');
            const status = document.getElementById('uploadStatusText');
            const step = document.getElementById('uploadStep');
            
            const file = input.files[0];
            const formData = new FormData(); formData.append('file', file);
            
            overlay.style.display = 'flex';
            
            // Artificial progress for better UX
            let p = 0;
            const interval = setInterval(() => {
                if (p < 90) {
                    p += (95 - p) * 0.1;
                    fill.style.width = p + '%';
                    if (p > 30) { status.textContent = 'Parsing Transactions...'; step.textContent = 'Formatting records'; }
                    if (p > 60) { status.textContent = 'Saving to Database...'; step.textContent = 'Bulk inserting rows'; }
                }
            }, 500);

            try {
                const res = await fetch(`${API_URL}/upload`, { method: 'POST', body: formData });
                const data = await res.json();
                
                clearInterval(interval);
                fill.style.width = '100%';
                status.textContent = 'Upload Successful!';
                step.textContent = `Imported ${data.count} records.`;
                
                setTimeout(() => {
                    overlay.style.display = 'none';
                    if (data.success) {
                        window.location.href = 'transactions.html';
                    }
                }, 1500);
            } catch (err) {
                clearInterval(interval);
                overlay.style.display = 'none';
                alert('Upload failed. Please check your CSV format.');
            }
        });
    </script>
</body>
</html>
